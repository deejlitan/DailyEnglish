<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>Daily English — 5+5</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface-2: #242440;
    --border: #2d2d4a;
    --text: #e8e8f0;
    --text-dim: #9a9ab0;
    --text-faint: #6a6a80;
    --accent: #7c6cf0;
    --accent-soft: #2a2548;
    --success: #4ade80;
    --warning: #fbbf24;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 32px; }

  /* Header */
  .header { padding: 12px 0 16px; }
  .date-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .date { font-size: 13px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.02em; }
  .streak { font-size: 13px; color: var(--warning); font-weight: 600; }
  .title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--text-dim); }

  /* Topic pill */
  .topic-pill {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    margin-top: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin: 20px 0 16px;
    background: var(--surface);
    padding: 4px;
    border-radius: 12px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab.active { background: var(--surface-2); color: var(--text); }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.2s;
  }
  .card.learned { opacity: 0.55; border-color: var(--accent-soft); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .word {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .pos {
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    margin-left: 6px;
    font-weight: 400;
  }
  .definition {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .example {
    font-size: 14px;
    color: var(--text);
    background: var(--surface-2);
    padding: 10px 12px;
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-style: italic;
  }
  .phrase {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .meaning {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .btn {
    flex: 1;
    padding: 8px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.learned-btn.done { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }
  .btn-icon { width: 36px; flex: 0 0 36px; padding: 8px; }

  /* Top actions */
  .top-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .refresh-btn {
    flex: 1;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .refresh-btn:active { background: var(--surface-2); }

  /* Topic selector */
  .topic-selector {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--surface);
    border-radius: 12px;
  }
  .topic-selector.open { display: flex; }
  .topic-btn {
    flex: 1 1 calc(50% - 6px);
    padding: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    text-transform: capitalize;
  }
  .topic-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

  /* Progress */
  .progress-bar {
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
    margin: 8px 0 16px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  /* Empty/loading state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--surface-2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stats footer */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 20px;
    padding: 16px;
    background: var(--surface);
    border-radius: 12px;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

  /* Install prompt */
  .install-banner {
    display: none;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text);
  }
  .install-banner.show { display: block; }
  .install-banner b { color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent);
    color: white;
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 6px 20px rgba(124, 108, 240, 0.4);
    transition: transform 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="date-row">
      <span class="date" id="dateText">Loading…</span>
      <span class="streak" id="streakText">🔥 0 day streak</span>

    <div class="topic-pill" id="topicPill" onclick="toggleTopicSelector()">📚 loading…</div>
  </div>

  <div class="topic-selector" id="topicSelector"></div>

  <div class="install-banner" id="installBanner">

  </div>

  <div class="top-actions">
    <button class="refresh-btn" onclick="generateNewSet()">
      <span>🔄</span><span>New set</span>

  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div id="content"></div>

  <div class="stats">

      <div class="stat-val" id="totalLearned">0</div>

    </div>

      <div class="stat-lbl">Today</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="daysActive">0</div>
      <div class="stat-lbl">Days</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const TOPICS = Object.keys(LIBRARY);
const TOPIC_EMOJI = { work: "💼", emotions: "💭", routines: "☕", opinions: "💬", goals: "🎯", stress: "😮‍💨", hobbies: "🎨" };

// =============== STATE ===============
const STORAGE_KEY = 'dailyEnglish_v1';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    seenWords: {}, // { topic: [list of seen word strings] }
    seenPhrases: {}, // { topic: [list of seen phrase strings] }
    learnedWords: [], // array of {topic, w}
    learnedPhrases: [], // array of {topic, p}
    todaySet: null, // { date, topic, words, phrases, learnedIds }
    selectedTopic: null, // user override
    daysActive: [],
    streak: 0,
    lastDate: null
  };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// =============== DATE HELPERS ===============
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

// =============== SET GENERATION ===============
function pickTopicForToday() {
  if (state.selectedTopic) return state.selectedTopic;
  // Rotate through topics by day-of-year
  const start = new Date(new Date().getFullYear(), 0, 0);
  const diff = (new Date() - start) + ((start.getTimezoneOffset() - new Date().getTimezoneOffset()) * 60 * 1000);
  const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
  return TOPICS[dayOfYear % TOPICS.length];
}

function pickFresh(pool, seen, count) {
  // Filter out already-seen items
  const available = pool.filter(item => {
    const key = item.w || item.p;
    return !seen.includes(key);
  });

  if (available.length >= count) {
    // Shuffle and take count
    const shuffled = [...available].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count);
  }

  // Pool exhausted — reset seen for this topic and start over
  return [...pool].sort(() => Math.random() - 0.5).slice(0, count);
}

function generateNewSet(forceNewTopic) {
  const topic = forceNewTopic || pickTopicForToday();

  if (!state.seenWords[topic]) state.seenWords[topic] = [];
  if (!state.seenPhrases[topic]) state.seenPhrases[topic] = [];

  const pickedWords = pickFresh(LIBRARY[topic].words, state.seenWords[topic], 5);
  const pickedPhrases = pickFresh(LIBRARY[topic].phrases, state.seenPhrases[topic], 5);

  // Check if pool exhausted (reset case)
  const wordsAvailable = LIBRARY[topic].words.filter(item => !state.seenWords[topic].includes(item.w)).length;
  const phrasesAvailable = LIBRARY[topic].phrases.filter(item => !state.seenPhrases[topic].includes(item.p)).length;

  if (wordsAvailable < 5) state.seenWords[topic] = [];
  if (phrasesAvailable < 5) state.seenPhrases[topic] = [];

  // Mark as seen
  pickedWords.forEach(item => {
    if (!state.seenWords[topic].includes(item.w)) state.seenWords[topic].push(item.w);
  });
  pickedPhrases.forEach(item => {
    if (!state.seenPhrases[topic].includes(item.p)) state.seenPhrases[topic].push(item.p);
  });

  state.todaySet = {
    date: todayStr(),
    topic: topic,
    words: pickedWords,
    phrases: pickedPhrases,
    learnedIds: []
  };

  saveState();
  render();
  showToast('New set ready! 🎉');
}

function ensureTodaySet() {
  const today = todayStr();
  if (!state.todaySet || state.todaySet.date !== today) {
    generateNewSet();
    updateStreak();
  }
}

function updateStreak() {
  const today = todayStr();
  if (state.daysActive.includes(today)) return;

  state.daysActive.push(today);

  if (state.lastDate) {
    const last = new Date(state.lastDate);
    const now = new Date(today);
    const diff = Math.round((now - last) / (1000 * 60 * 60 * 24));
    if (diff === 1) state.streak += 1;
    else if (diff > 1) state.streak = 1;
    else state.streak = state.streak || 1;
  } else {
    state.streak = 1;
  }
  state.lastDate = today;
  saveState();
}

// =============== UI ===============
let currentTab = 'words';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderContent();
}

function toggleLearned(type, idx) {
  const id = type + '_' + idx;
  const learned = state.todaySet.learnedIds;
  const item = type === 'words' ? state.todaySet.words[idx] : state.todaySet.phrases[idx];

  if (learned.includes(id)) {
    state.todaySet.learnedIds = learned.filter(x => x !== id);
  } else {
    state.todaySet.learnedIds.push(id);
    // Add to overall learned list
    if (type === 'words') {
      const exists = state.learnedWords.find(x => x.w === item.w && x.topic === state.todaySet.topic);
      if (!exists) state.learnedWords.push({ topic: state.todaySet.topic, w: item.w });
    } else {
      const exists = state.learnedPhrases.find(x => x.p === item.p && x.topic === state.todaySet.topic);
      if (!exists) state.learnedPhrases.push({ topic: state.todaySet.topic, p: item.p });
    }
    showToast('Nice! 👍');
  }
  saveState();
  render();
}

function speak(text) {
  if (!('speechSynthesis' in window)) {
    showToast('Speech not supported');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.9;
  window.speechSynthesis.speak(utter);
}

function toggleTopicSelector() {
  document.getElementById('topicSelector').classList.toggle('open');
}

function selectTopic(topic) {
  state.selectedTopic = topic;
  saveState();
  generateNewSet(topic);
  document.getElementById('topicSelector').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderContent() {
  const container = document.getElementById('content');
  if (!state.todaySet) {
    container.innerHTML = '<div class="empty"><div class="spinner"></div>Loading…</div>';
    return;
  }

  if (currentTab === 'words') {
    container.innerHTML = state.todaySet.words.map((item, idx) => {
      const id = 'words_' + idx;
      const isLearned = state.todaySet.learnedIds.includes(id);
      return `
        <div class="card ${isLearned ? 'learned' : ''}">
          <div class="card-header">
            <div><span class="word">${escapeHtml(item.w)}</span><span class="pos">${escapeHtml(item.pos)}</span></div>
          </div>
          <div class="definition">${escapeHtml(item.def)}</div>
          <div class="example">"${escapeHtml(item.ex)}"</div>
          <div class="actions">
            <button class="btn" onclick="speak('${escapeHtml(item.w).replace(/'/g, "\\'")}')">🔊 Word</button>
            <button class="btn" onclick="speak('${escapeHtml(item.ex).replace(/'/g, "\\'")}')">🔊 Example</button>
            <button class="btn learned-btn ${isLearned ? 'done' : ''}" onclick="toggleLearned('words', ${idx})">${isLearned ? '✓ Got it' : 'Got it'}</button>
          </div>
        </div>
      `;
    }).join('');
  } else {
    container.innerHTML = state.todaySet.phrases.map((item, idx) => {
      const id = 'phrases_' + idx;
      const isLearned = state.todaySet.learnedIds.includes(id);
      return `
        <div class="card ${isLearned ? 'learned' : ''}">
          <div class="phrase">${escapeHtml(item.p)}</div>
          <div class="meaning">↳ ${escapeHtml(item.m)}</div>
          <div class="actions">
            <button class="btn" onclick="speak('${escapeHtml(item.p).replace(/'/g, "\\'")}')">🔊 Listen</button>
            <button class="btn learned-btn ${isLearned ? 'done' : ''}" onclick="toggleLearned('phrases', ${idx})">${isLearned ? '✓ Got it' : 'Got it'}</button>
          </div>
        </div>
      `;
    }).join('');
  }
}

function renderTopicSelector() {
  const sel = document.getElementById('topicSelector');
  sel.innerHTML = TOPICS.map(t => `
    <button class="topic-btn ${state.todaySet && state.todaySet.topic === t ? 'selected' : ''}" onclick="selectTopic('${t}')">
      ${TOPIC_EMOJI[t]} ${t}
    </button>
  `).join('');
}

function render() {
  document.getElementById('dateText').textContent = formatDate();
  document.getElementById('streakText').textContent = `🔥 ${state.streak} day streak`;

  if (state.todaySet) {
    const topic = state.todaySet.topic;
    document.getElementById('topicPill').innerHTML = `${TOPIC_EMOJI[topic]} ${topic} <span style="opacity:0.6">▾</span>`;

    const total = 10;
    const learned = state.todaySet.learnedIds.length;
    document.getElementById('progressFill').style.width = (learned / total * 100) + '%';
    document.getElementById('todayLearned').textContent = learned + '/10';
  }

  document.getElementById('totalLearned').textContent = state.learnedWords.length + state.learnedPhrases.length;
  document.getElementById('daysActive').textContent = state.daysActive.length;

  renderTopicSelector();
  renderContent();
}

// =============== INSTALL PROMPT ===============
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

// Show iOS install banner if applicable
function checkInstallPrompt() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem('installBannerDismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
}

// =============== INIT ===============
ensureTodaySet();
render();
checkInstallPrompt();

// Service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
  });
}

// Refresh state on visibility change (check if day changed)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    ensureTodaySet();
    render();
  }
});
